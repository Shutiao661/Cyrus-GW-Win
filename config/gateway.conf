# ============================================================================
# gateway.conf - Cyrus-GW 网关配置文件
# ============================================================================
# 格式: INI 风格 (section/key=value)
# 注释: # 或 ; 开头

# --- 服务器配置 ---
[server]
# 监听地址 (0.0.0.0 = 所有网卡, 127.0.0.1 = 仅本地)
listen_address = 0.0.0.0
# 监听端口
listen_port = 8080
# 工作线程数 (0 = 自动检测 CPU 核心数)
worker_threads = 0

# --- Agent 后端配置 ---
[agent]
# Agent 服务器地址
host = 127.0.0.1
# Agent 服务器端口
port = 9999
# Agent 连接池大小
pool_size = 4
# Agent 连接超时 (毫秒)
connect_timeout_ms = 5000
# Agent 请求超时 (毫秒)
request_timeout_ms = 30000

# --- 连接限制 ---
[connection]
# 最大并发连接数
max_connections = 10000
# Keep-alive 空闲超时 (秒)
keepalive_timeout_s = 5
# Keep-alive 最大请求数 (单连接)
max_keepalive_requests = 1000
# 最大请求头大小 (字节)
max_header_size = 8192

# --- 日志 ---
[logging]
# 日志级别: DEBUG / INFO / WARN / ERROR
level = INFO
# 日志文件 (为空则输出到 stdout)
# file = logs/gateway.log

# --- 限流配置 ---
[rate_limit]
# 全局限流: tokens/秒
global_rate = 1000
# 全局突发容量
global_capacity = 2000
# 每 IP 限流: tokens/秒
per_ip_rate = 50
# 每 IP 突发容量
per_ip_capacity = 100

# --- SSE 超时配置 ---
[sse]
# 首包超时 (毫秒): SSE header 发送后等待 Agent 第一个数据帧
first_byte_timeout_ms = 15000
# 总超时 (毫秒): 整个 SSE 流的最长持续时间
total_timeout_ms = 120000
# 帧间超时 (毫秒): 两个数据帧之间的最大间隔
idle_timeout_ms = 30000
